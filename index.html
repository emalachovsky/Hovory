<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0a0d12">
<meta name="description" content="Správa hovory - EnergyPartners">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hovory">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23f5b942' width='192' height='192'/><text x='50%' y='50%' font-size='120' font-weight='bold' text-anchor='middle' dominant-baseline='central' fill='%230a0d12' font-family='Georgia'>☎</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23f5b942' width='192' height='192' rx='45'/><text x='50%' y='50%' font-size='120' font-weight='bold' text-anchor='middle' dominant-baseline='central' fill='%230a0d12' font-family='Georgia'>☎</text></svg>">
<title>Hovory · EnergyPartners</title>
<style>
  :root{
    --bg: #0a0d12;
    --bg-elevated: #12161e;
    --card: #161b24;
    --card-border: #232936;
    --amber: #f5b942;
    --amber-dim: #8a6a26;
    --teal: #34d6ae;
    --red: #ef5b5b;
    --text: #eae7df;
    --text-dim: #8b93a1;
    --text-faint: #545b68;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text);}
  body{
    font-family: -apple-system, "SF Pro Text", Inter, system-ui, sans-serif;
    overflow-x:hidden;
    min-height:100vh;
  }
  .app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    background:
      radial-gradient(120% 60% at 15% -10%, rgba(245,185,66,0.08), transparent 60%),
      var(--bg);
  }

  header{
    padding: calc(18px + var(--safe-top)) 20px 14px;
    position:sticky; top:0; z-index:20;
    background: rgba(10,13,18,0.92);
    backdrop-filter: blur(14px);
    border-bottom:1px solid var(--card-border);
  }
  .header-top{
    display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;
  }
  .eyebrow{
    font-size:11px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--amber); font-weight:700; display:flex; align-items:center; gap:6px;
  }
  .eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--amber); box-shadow:0 0 0 0 rgba(245,185,66,.6); animation:pulse 2s infinite;}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(245,185,66,.55);}
    70%{box-shadow:0 0 0 8px rgba(245,185,66,0);}
    100%{box-shadow:0 0 0 0 rgba(245,185,66,0);}
  }
  .refresh-btn{
    width:36px; height:36px; border-radius:50%;
    background:var(--bg-elevated); border:1px solid var(--card-border);
    color:var(--amber); cursor:pointer; display:flex; align-items:center; justify-content:center;
    font-size:18px; transition: all .2s ease;
  }
  .refresh-btn:hover{
    border-color:var(--amber); background:rgba(245,185,66,0.1);
  }
  .refresh-btn.spinning{
    animation: spin .8s linear infinite;
  }
  @keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
  }
  h1{
    font-family: "Georgia", "Iowan Old Style", serif;
    font-size:30px; line-height:1.05; margin:6px 0 2px;
    font-weight:600; letter-spacing:-.01em;
    text-transform:capitalize;
  }
  .datesub{color:var(--text-dim); font-size:14px; margin-bottom:14px;}
  .stat-row{display:flex; gap:8px;}
  .stat{
    flex:1; background:var(--bg-elevated); border:1px solid var(--card-border);
    border-radius:12px; padding:9px 10px;
  }
  .stat b{display:block; font-size:19px; font-variant-numeric: tabular-nums; color:var(--text);}
  .stat span{font-size:10.5px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.05em;}
  .stat.warn b{color:var(--red);}
  
  .tabbar-wrap{
    background: rgba(10,13,18,0.92); backdrop-filter: blur(14px);
    border-bottom:1px solid var(--card-border);
    position:sticky; top:0; z-index:19; padding-bottom:10px;
  }
  .tabs{
    display:flex; gap:6px; padding:12px 20px 0;
  }
  .tab{
    flex:1; text-align:center; padding:9px 6px; border-radius:10px;
    font-size:13px; font-weight:600; color:var(--text-dim);
    background:var(--bg-elevated); border:1px solid var(--card-border);
    cursor:pointer; user-select:none; transition: all .15s ease;
  }
  .tab.active{ color:#12161e; background:var(--amber); border-color:var(--amber);}
  .tab .count{ font-size:10px; opacity:.8; margin-left:3px;}

  .search-wrap{padding:10px 20px 0;}
  .search{
    width:100%; padding:10px 12px; border-radius:10px; border:1px solid var(--card-border);
    background:var(--bg-elevated); color:var(--text); font-size:15px; outline:none;
  }
  .search::placeholder{color:var(--text-faint);}

  main{flex:1; padding: 10px 16px 30px;}
  .group-label{
    font-size:11.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-faint);
    padding:16px 6px 8px; font-weight:700;
  }
  .group-label.overdue{color:var(--red);}
  .group-label.today{color:var(--amber);}

  .card{
    display:flex; align-items:center; gap:12px;
    background:var(--card); border:1px solid var(--card-border);
    border-radius:14px; padding:12px; margin-bottom:8px;
    cursor:pointer;
    transition: transform .08s ease, border-color .12s ease;
  }
  .card:active{ transform: scale(0.985); border-color: var(--amber-dim);}

  .time-chip{
    min-width:52px; text-align:center; flex-shrink:0;
  }
  .time-chip b{display:block; font-size:15px; font-variant-numeric:tabular-nums; color:var(--amber);}
  .time-chip span{display:block; font-size:9.5px; color:var(--text-faint); text-transform:uppercase;}

  .card-body{flex:1; min-width:0;}
  .card-company{font-size:14.5px; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .card-name{font-size:12.5px; color:var(--text-dim); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .card-note{font-size:12px; color:var(--text-faint); margin-top:4px; display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; overflow:hidden;}
  .card-next{
    display:inline-block; margin-top:5px; font-size:10.5px; color:var(--teal);
    background: rgba(52,214,174,0.1); border:1px solid rgba(52,214,174,0.25);
    padding:2px 7px; border-radius:6px; font-weight:600;
  }

  .call-btn{
    flex-shrink:0; width:40px; height:40px; border-radius:50%;
    background: var(--amber); display:flex; align-items:center; justify-content:center;
    text-decoration:none; color:#0a0d12;
  }
  .call-btn svg{width:18px; height:18px;}

  .empty{
    text-align:center; padding:50px 20px; color:var(--text-dim);
  }
  .empty .spark{font-size:34px; margin-bottom:10px;}
  .empty b{display:block; color:var(--text); font-size:16px; margin-bottom:4px;}
  .empty p{font-size:13px; margin:0;}

  .detail-overlay{
    position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7);
    z-index:100; opacity:0; pointer-events:none; transition:opacity .2s ease;
  }
  .detail-overlay.active{
    opacity:1; pointer-events:auto;
  }
  .detail-panel{
    position:fixed; bottom:0; left:0; right:0; max-width:480px;
    margin:0 auto; background:var(--bg); border-radius:24px 24px 0 0;
    border-top:1px solid var(--card-border); z-index:101;
    max-height:90vh; display:flex; flex-direction:column;
    transform:translateY(100%); transition:transform .3s ease;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
  }
  .detail-panel.active{
    transform:translateY(0);
  }
  .detail-header{
    padding: 20px 20px 16px; border-bottom:1px solid var(--card-border);
    display:flex; justify-content:space-between; align-items:center;
  }
  .detail-header h2{
    margin:0; font-size:18px; font-weight:600; color:var(--text);
  }
  .detail-close{
    width:32px; height:32px; border-radius:50%; background:var(--bg-elevated);
    border:1px solid var(--card-border); color:var(--text); cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:20px;
  }
  .detail-close:active{
    background:var(--card);
  }
  .detail-content{
    flex:1; overflow-y:auto; padding:20px;
  }
  .detail-row{
    margin-bottom:20px;
  }
  .detail-label{
    font-size:11.5px; text-transform:uppercase; letter-spacing:.08em;
    color:var(--text-faint); margin-bottom:6px; font-weight:700;
  }
  .detail-value{
    font-size:15px; color:var(--text); line-height:1.5;
    padding:12px; background:var(--card); border-radius:10px;
    border:1px solid var(--card-border); word-wrap:break-word; white-space:pre-wrap;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-top">
      <div class="eyebrow"><span class="dot"></span> Dnes</div>
      <button class="refresh-btn" id="refreshBtn" title="Obnoviť údaje">🔄</button>
    </div>
    <h1 id="todayHeading">Loading</h1>
    <div class="datesub" id="todaySub">loading date</div>
    <div class="stat-row">
      <div class="stat"><b id="statToday">0</b><span>Dnes</span></div>
      <div class="stat warn"><b id="statOverdue">0</b><span>Meškajúce</span></div>

    <div class="tabs">
      <div class="tab active" data-tab="today">Dnes <span class="count" id="countToday">(0)</span></div>
      <div class="tab" data-tab="upcoming">Nadchádzajúce</div>

    </div>
  </div>
  <main id="list"></main>
</div>

<div class="detail-overlay" id="detailOverlay"></div>
<div class="detail-panel" id="detailPanel">
  <div class="detail-header">
    <h2 id="detailTitle">Detail</h2>
    <div class="detail-close" id="detailClose">✕</div>
  </div>
  <div class="detail-content" id="detailContent"></div>
</div>

<script>
// Google Sheets API detaily
const SHEET_ID = '2PACX-1vT1MQEhjX-Y6oigTEGFLdxI7RAspdVKg_3XA64yGMKbtEir6JiFoTyEj3N8tKWyJ8hwWFwMJCAdW69T';
const API_KEY = 'AIzaSyDRccaAkl4j_NCHTxw3LbJpI2j1IBpSAN8';
const RANGE = 'A1:Z1000';  // Čítaj veľké rozsahy

const SHEETS_API_URL = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${RANGE}?key=${API_KEY}`;

let DATA = [];
let lastSync = null;

// Pomocná funkcia na čistenie textu - odstránenie line breaks
function cleanText(text) {
  if (!text) return '';
  // Odstránime všetky line breaks a nahradzujeme viacnásobné medzery jednou
  return text.toString()
    .replace(/\r\n/g, ' ')    // Windows line breaks
    .replace(/\n/g, ' ')      // Unix line breaks
    .replace(/\r/g, ' ')      // Old Mac line breaks
    .replace(/  +/g, ' ')     // Viacnásobné medzery -> jedna
    .trim();
}

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const char = line[i];
    if (char === '"') {
      if (inQuotes && line[i + 1] === '"') {
        current += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (char === ',' && !inQuotes) {
      result.push(current.trim());
      current = '';
    } else {
      current += char;
    }
  }
  result.push(current.trim());
  return result;
}

async function loadDataFromCSV() {
  const btn = document.getElementById('refreshBtn');
  
  try {
    console.log('📡 Pokúšam stiahnuť dáta z Google Sheets...');
    btn.title = 'Načítavam...';
    
    const response = await fetch(SHEETS_API_URL);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    
    const json = await response.json();
    const values = json.values;
    
    if (!values || values.length === 0) {
      throw new Error('Tabuľka je prázdna');
    }
    
    // Prvý riadok sú headery
    const headers = values[0];
    const rawData = [];
    
    // Parsuj zvyšné riadky
    for (let i = 1; i < values.length; i++) {
      const row = values[i];
      if (!row || row.length === 0) continue;
      
      const data = {};
      headers.forEach((header, idx) => {
        data[header] = row[idx] || '';
      });
      
      // Skontroluj či má aspoň meno alebo firmu
      if (data['Názov firmy'] || data['Meno']) {
        rawData.push({
          company: cleanText(data['Názov firmy'] || ''),
          name: cleanText(data['Meno'] || ''),
          tel: cleanText(data['Telefón'] || ''),
          phoneDisplay: cleanText(data['Telefón'] || ''),
          time: cleanText(data['Čas'] || ''),
          date: cleanText(data['Dátum'] || ''),
          note: cleanText(data['Poznámka'] || ''),
          next: cleanText(data['Nasleduje'] || '')
        });
      }
    }
    
    if (rawData.length > 0) {
      // Uložiť do localStorage
      localStorage.setItem('hovory_data', JSON.stringify(rawData));
      lastSync = new Date().toLocaleTimeString('sk-SK');
      localStorage.setItem('hovory_lastsync', lastSync);
      
      console.log(`✅ Úspešne stiahnuté ${rawData.length} kontaktov z Google Sheets. Uložené lokálne.`);
      btn.title = `📱 Posledná synchronizácia: ${lastSync}`;
      return rawData;
    } else {
      throw new Error('Žiadne platné dáta v tabuľke');
    }
  } catch (error) {
    console.warn('❌ Chyba pri sťahovaní z API:', error.message);
    
    // Fallback: Načítať zo localStorage
    console.log('📚 Načítavam uložené dáta z mobilného úložiska...');
    const stored = localStorage.getItem('hovory_data');
    lastSync = localStorage.getItem('hovory_lastsync');
    
    if (stored) {
      try {
        const data = JSON.parse(stored);
        console.log(`✅ Načítané ${data.length} kontaktov z lokálneho úložiska.`);
        if (lastSync) {
          btn.title = `⚠️ Offline režim. Posledná sync: ${lastSync}`;
        }
        return data;
      } catch (e) {
        console.error('Chyba pri parsovaní uložených dát:', e);
        return [];
      }
    } else {
      console.error('❌ Žiadne uložené dáta a internet nie je dostupný.');
      btn.title = '❌ Žiadne dáta';
      return [];
    }
  }
}

function parseSkDate(s){
  if(!s) return null;
  s = s.trim();
  
  // Formát: 19.7.2026
  let m = s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
  if(m) return new Date(parseInt(m[3]), parseInt(m[2])-1, parseInt(m[1]));
  
  // Formát: Sun Jul 19 2026 (alebo iný JS Date format)
  const d = new Date(s);
  if(!isNaN(d.getTime())) return d;
  
  // ISO formát: 2026-07-19
  m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m) return new Date(parseInt(m[1]), parseInt(m[2])-1, parseInt(m[3]));
  
  return null;
}
function parseTimeMinutes(t){
  if(!t) return 9999;
  const m = t.trim().match(/^(\d{1,2}):(\d{2})$/);
  if(!m) return 9999;
  return parseInt(m[1])*60 + parseInt(m[2]);
}

const now = new Date();
const todayMid = new Date(now.getFullYear(), now.getMonth(), now.getDate());

function daysBetween(a,b){ return Math.round((b-a)/86400000); }

const WEEKDAYS_SK = ["Nedeľa","Pondelok","Utorok","Streda","Štvrtok","Piatok","Sobota"];
const MONTHS_SK = ["januára","februára","marca","apríla","mája","júna","júla","augusta","septembra","októbra","novembra","decembra"];

function updateStats(){
  const countToday = DATA.filter(d=>d._bucket==='today').length;
  const countOverdue = DATA.filter(d=>d._bucket==='overdue').length;
  const countWeek = DATA.filter(d=>d._bucket==='week' || d._bucket==='today').length;
  document.getElementById('statToday').textContent = countToday;
  document.getElementById('statOverdue').textContent = countOverdue;
  document.getElementById('statWeek').textContent = countWeek;
  document.getElementById('statAll').textContent = DATA.length;
  document.getElementById('countToday').textContent = `(${countToday})`;
  
  document.getElementById('todayHeading').textContent = WEEKDAYS_SK[todayMid.getDay()];
  document.getElementById('todaySub').textContent = `${todayMid.getDate()}. ${MONTHS_SK[todayMid.getMonth()]} ${todayMid.getFullYear()}`;
}

function classifyData(){
  DATA = DATA.map(d => ({...d, _date: parseSkDate(d.date), _timeMin: parseTimeMinutes(d.time)}));
  DATA.forEach(d => {
    if(!d._date){ d._bucket = 'nodate'; return; }
    const diff = daysBetween(todayMid, d._date);
    if(diff < 0) d._bucket = 'overdue';
    else if(diff === 0) d._bucket = 'today';
    else if(diff <= 7) d._bucket = 'week';
    else d._bucket = 'later';
  });
}

const callIcon = `<svg viewBox="0 0 24 24" fill="none"><path d="M6.6 10.8c1.4 2.8 3.7 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1.1-.2 1.2.4 2.5.6 3.8.6.6 0 1 .4 1 1V20.7c0 .6-.4 1-1 1C10.6 21.7 2.3 13.4 2.3 3.7c0-.6.4-1 1-1H7c.6 0 1 .4 1 1 0 1.3.2 2.6.6 3.8.1.4 0 .8-.2 1.1L6.6 10.8z" fill="#12161e"/></svg>`;

function fmtDateShort(d){
  if(!d) return '';
  return `${d.getDate()}.${d.getMonth()+1}.`;
}

function fmtDateFull(d){
  if(!d) return 'bez dátumu';
  return `${d.getDate()}. ${MONTHS_SK[d.getMonth()]} ${d.getFullYear()}`;
}

function renderCard(item){
  const timeLabel = item.time ? item.time : '–';
  const dateLabel = item._date ? fmtDateShort(item._date) : '';
  const href = item.tel ? `tel:${item.tel}` : '#';
  return `
  <div class="card" data-company="${escapeHtml(item.company)}" data-name="${escapeHtml(item.name)}">
    <div class="time-chip"><b>${timeLabel}</b><span>${dateLabel}</span></div>
    <div class="card-body">
      <div class="card-company">${escapeHtml(item.company || item.name || 'Bez názvu')}</div>
      ${item.name ? `<div class="card-name">${escapeHtml(item.name)}${item.phoneDisplay ? ' · '+escapeHtml(item.phoneDisplay) : ''}</div>` : (item.phoneDisplay ? `<div class="card-name">${escapeHtml(item.phoneDisplay)}</div>` : '')}
      ${item.note ? `<div class="card-note">${escapeHtml(item.note)}</div>` : ''}
      ${item.next ? `<div class="card-next">${escapeHtml(item.next)}</div>` : ''}
    </div>
    <a href="${href}" class="call-btn">${callIcon}</a>
  </div>`;
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function emptyState(msg, sub){
  return `<div class="empty"><div class="spark">⚡</div><b>${msg}</b><p>${sub}</p></div>`;
}

let currentTab = 'today';
let searchTerm = '';

function render(){
  const list = document.getElementById('list');
  let html = '';

  if(currentTab === 'today'){
    const items = DATA.filter(d=>d._bucket==='today').sort((a,b)=>a._timeMin-b._timeMin);
    if(items.length===0){
      const next = DATA.filter(d=>d._date && d._date > todayMid).sort((a,b)=>a._date-b._date)[0];
      html = emptyState('Na dnes nemáš naplánované žiadne hovory.', next ? `Najbližší hovor: ${next.company} — ${fmtDateShort(next._date)} o ${next.time||''}` : 'Skontroluj záložku Všetky.');
    } else {
      html += items.map(item => renderCard(item)).join('');
    }
  }

  if(currentTab === 'upcoming'){
    const overdue = DATA.filter(d=>d._bucket==='overdue').sort((a,b)=>a._date-b._date);
    const today = DATA.filter(d=>d._bucket==='today').sort((a,b)=>a._timeMin-b._timeMin);
    const week = DATA.filter(d=>d._bucket==='week').sort((a,b)=>a._date-b._date || a._timeMin-b._timeMin);
    const later = DATA.filter(d=>d._bucket==='later').sort((a,b)=>a._date-b._date || a._timeMin-b._timeMin);
    if(overdue.length){
      html += `<div class="group-label overdue">Meškajúce (${overdue.length})</div>` + overdue.map(item => renderCard(item)).join('');
    }
    if(today.length){
      html += `<div class="group-label today">Dnes</div>` + today.map(item => renderCard(item)).join('');
    }
    if(week.length){
      html += `<div class="group-label">Tento týždeň</div>` + week.map(item => renderCard(item)).join('');
    }
    if(later.length){
      html += `<div class="group-label">Neskôr</div>` + later.map(item => renderCard(item)).join('');
    }
    if(!html) html = emptyState('Žiadne nadchádzajúce hovory.', 'Skús záložku Všetky.');
  }

  if(currentTab === 'all'){
    let items = DATA.slice().sort((a,b)=>{
      const ad = a._date ? a._date.getTime() : Infinity;
      const bd = b._date ? b._date.getTime() : Infinity;
      return ad - bd || a._timeMin - b._timeMin;
    });
    if(searchTerm){
      const term = searchTerm.toLowerCase();
      items = items.filter(d => (d.company + ' ' + d.name).toLowerCase().includes(term));
    }
    if(items.length===0){
      html = emptyState('Žiadne hovory.', 'Skús inú vyhľadávku.');
    } else {
      html += items.map(item => renderCard(item)).join('');
    }
  }

  list.innerHTML = html;
  
  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', e => {
      if(e.target.closest('.call-btn')) return;
      const company = card.dataset.company;
      const name = card.dataset.name;
      const item = DATA.find(d => d.company === company && d.name === name);
      if(item) openDetail(item);
    });
  });
}

function openDetail(item){
  document.getElementById('detailTitle').textContent = item.company || item.name;
  document.getElementById('detailContent').innerHTML = `
    <div class="detail-row">
      <div class="detail-label">Spoločnosť</div>
      <div class="detail-value">${escapeHtml(item.company || '–')}</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Osoba</div>
      <div class="detail-value">${escapeHtml(item.name || '–')}</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Telefón</div>
      <div class="detail-value">${item.tel ? `<a href="tel:${item.tel}" style="color:var(--teal)">${escapeHtml(item.tel)}</a>` : '–'}</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Dátum a čas</div>
      <div class="detail-value">${item.date || '–'} ${item.time || ''}</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Poznámka</div>
      <div class="detail-value">${escapeHtml(item.note || '–')}</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Ďalší krok</div>
      <div class="detail-value">${escapeHtml(item.next || '–')}</div>
    </div>
  `;
  document.getElementById('detailOverlay').classList.add('active');
  document.getElementById('detailPanel').classList.add('active');
}

function closeDetail(){
  document.getElementById('detailOverlay').classList.remove('active');
  document.getElementById('detailPanel').classList.remove('active');
}

document.getElementById('detailClose').addEventListener('click', closeDetail);
document.getElementById('detailOverlay').addEventListener('click', e => {
  if(e.target === document.getElementById('detailOverlay')) closeDetail();
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    document.getElementById('searchWrap').style.display = currentTab === 'all' ? 'block' : 'none';
    render();
  });
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value;
  render();
});

document.getElementById('refreshBtn').addEventListener('click', async () => {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  
  try {
    const rawData = await loadDataFromCSV();
    DATA = rawData;
    if (DATA.length > 0) {
      classifyData();
      updateStats();
      render();
    }
  } catch (error) {
    console.error('Chyba pri refresh:', error);
  }
  
  btn.classList.remove('spinning');
});

async function initialize() {
  // Obnoviť stav online/offline
  lastSync = localStorage.getItem('hovory_lastsync');
  const btn = document.getElementById('refreshBtn');
  
  if (lastSync) {
    btn.title = `📱 Posledná synchronizácia: ${lastSync}`;
  }
  
  const rawData = await loadDataFromCSV();
  DATA = rawData;
  if (DATA.length > 0) {
    classifyData();
    updateStats();
    render();
  } else {
    // Zobraz prázdny stav ak nemáme dáta
    document.getElementById('list').innerHTML = emptyState(
      'Žiadne dáta k dispozícii.',
      'Stlačte 🔄 na stiahnutie dát z internetu.'
    );
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initialize);
} else {
  initialize();
}
</script>
</body>
</html>
