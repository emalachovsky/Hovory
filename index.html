<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0a0d12">
<title>Hovory</title>
<style>
* { box-sizing: border-box; }
body { margin: 0; padding: 0; background: #0a0d12; color: #eae7df; font-family: system-ui, sans-serif; }
.app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
header { padding: 20px; background: rgba(10,13,18,0.92); border-bottom: 1px solid #232936; position: sticky; top: 0; z-index: 20; }
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.eyebrow { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: #f5b942; font-weight: 700; }
.btn-group { display: flex; gap: 8px; }
.btn { width: 36px; height: 36px; border-radius: 50%; background: #12161e; border: 1px solid #232936; color: #f5b942; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
.btn:hover { border-color: #f5b942; background: rgba(245,185,66,0.1); }
.btn.spinning { animation: spin 0.8s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
h1 { font-family: "Georgia", serif; font-size: 30px; margin: 6px 0 2px; font-weight: 600; }
.subtitle { color: #8b93a1; font-size: 14px; margin-bottom: 14px; }
.stats { display: flex; gap: 8px; }
.stat { flex: 1; background: #12161e; border: 1px solid #232936; border-radius: 12px; padding: 10px; text-align: center; }
.stat-val { font-size: 19px; font-weight: bold; color: #f5b942; }
.stat-label { font-size: 10px; color: #8b93a1; text-transform: uppercase; margin-top: 4px; }
main { flex: 1; padding: 16px; overflow-y: auto; }
.card { background: #161b24; border: 1px solid #232936; border-radius: 14px; padding: 12px; margin-bottom: 8px; display: flex; gap: 12px; }
.card-left { flex-shrink: 0; width: 50px; }
.card-time { font-weight: bold; color: #f5b942; font-size: 14px; }
.card-body { flex: 1; min-width: 0; }
.card-company { font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-name { font-size: 12px; color: #8b93a1; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-note { font-size: 12px; color: #545b68; margin-top: 4px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
.empty { text-align: center; padding: 50px 20px; color: #8b93a1; }
.empty-icon { font-size: 34px; margin-bottom: 10px; }
.empty-text { font-size: 16px; font-weight: 600; color: #eae7df; margin-bottom: 4px; }
.toast { position: fixed; bottom: 30px; left: 20px; right: 20px; max-width: 440px; background: #161b24; border: 1px solid #232936; border-radius: 12px; padding: 14px 16px; color: #eae7df; z-index: 150; animation: slideUp 0.3s ease; }
@keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-top">
      <div class="eyebrow">◉ Aktuálne hovory</div>
      <div class="btn-group">
        <button class="btn" id="refreshBtn" title="Obnoviť dáta">↻</button>
        <button class="btn" id="exportBtn" title="Exportovať">⬇️</button>
      </div>
    </div>
    <h1>Hovory</h1>
    <div class="subtitle">Načítavam...</div>
    <div class="stats">
      <div class="stat">
        <div class="stat-val" id="countVal">0</div>
        <div class="stat-label">Hovorov</div>
      </div>
    </div>
  </header>

  <main id="list"></main>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT1MQEhjX-Y6oigTEGFLdxI7RAspdVKg_3XA64yGMKbtEir6JiFoTyEj3N8tKWyJ8hwWFwMJCAdW69T/pub?gid=356854980&single=true&output=csv';

let allData = [];

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const char = line[i];
    if (char === '"') {
      if (inQuotes && line[i + 1] === '"') {
        current += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (char === ',' && !inQuotes) {
      result.push(current.trim());
      current = '';
    } else {
      current += char;
    }
  }
  result.push(current.trim());
  return result;
}

async function loadData() {
  try {
    console.log('🔄 Načítavam CSV...');
    const response = await fetch(CSV_URL);
    const csv = await response.text();
    const lines = csv.trim().split('\n');
    const headers = parseCSVLine(lines[0]);
    
    const data = [];
    for (let i = 1; i < lines.length; i++) {
      if (!lines[i].trim()) continue;
      const values = parseCSVLine(lines[i]);
      const row = {};
      headers.forEach((header, idx) => {
        row[header] = values[idx] || '';
      });
      if (row['Názov firmy'] || row['Meno']) {
        data.push(row);
      }
    }
    
    console.log(`✅ Načítané ${data.length} hovorov`);
    allData = data;
    localStorage.setItem('hovoryData', JSON.stringify(data));
    render();
    showToast(`✅ Načítané ${data.length} hovorov`);
  } catch (error) {
    console.error('❌ Chyba:', error);
    showToast('❌ Chyba: ' + error.message);
  }
}

function render() {
  const list = document.getElementById('list');
  
  if (allData.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">Žiadne hovory</div></div>';
    document.querySelector('.subtitle').textContent = 'Klikni na Refresh';
    document.getElementById('countVal').textContent = '0';
    return;
  }
  
  list.innerHTML = '';
  allData.forEach(row => {
    const company = row['Názov firmy'] || '–';
    const name = row['Meno'] || '–';
    const time = row['Čas'] || '';
    const note = row['Poznámka'] || '';
    const timeDisplay = time ? time.substring(0, 5) : '–';
    
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-left"><div class="card-time">${timeDisplay}</div></div>
      <div class="card-body">
        <div class="card-company">${company}</div>
        <div class="card-name">${name}</div>
        ${note ? `<div class="card-note">${note}</div>` : ''}
      </div>
    `;
    list.appendChild(card);
  });
  
  document.querySelector('.subtitle').textContent = `${allData.length} hovorov`;
  document.getElementById('countVal').textContent = allData.length;
}

function showToast(msg) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => {
    toast.style.animation = 'slideUp 0.3s ease reverse';
    setTimeout(() => toast.remove(), 300);
  }, 2500);
}

document.getElementById('refreshBtn').addEventListener('click', async () => {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  await loadData();
  btn.classList.remove('spinning');
});

document.getElementById('exportBtn').addEventListener('click', () => {
  const csv = localStorage.getItem('hovoryData');
  if (!csv) { showToast('❌ Žiadne dáta'); return; }
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `hovory_${new Date().toISOString().split('T')[0]}.csv`;
  link.click();
  URL.revokeObjectURL(url);
  showToast('✅ CSV exportovaný');
});

window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('hovoryData');
  if (saved) {
    try {
      allData = JSON.parse(saved);
      render();
    } catch (e) {}
  }
  loadData();
});
</script>
</body>
</html>
