<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0a0d12">
<meta name="description" content="Správa hovory - CRM EnergyPartners">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hovory">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23f5b942' width='192' height='192'/><text x='50%' y='50%' font-size='120' font-weight='bold' text-anchor='middle' dominant-baseline='central' fill='%230a0d12' font-family='Georgia'>☎</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23f5b942' width='192' height='192' rx='45'/><text x='50%' y='50%' font-size='120' font-weight='bold' text-anchor='middle' dominant-baseline='central' fill='%230a0d12' font-family='Georgia'>☎</text></svg>">
<title>Hovory · CRM EnergyPartners</title>
<style>
  :root{
    --bg: #0a0d12;
    --bg-elevated: #12161e;
    --card: #161b24;
    --card-border: #232936;
    --amber: #f5b942;
    --amber-dim: #8a6a26;
    --teal: #34d6ae;
    --red: #ef5b5b;
    --text: #eae7df;
    --text-dim: #8b93a1;
    --text-faint: #545b68;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text);}
  body{
    font-family: -apple-system, "SF Pro Text", Inter, system-ui, sans-serif;
    overflow-x:hidden;
    min-height:100vh;
  }
  .app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    background:
      radial-gradient(120% 60% at 15% -10%, rgba(245,185,66,0.08), transparent 60%),
      var(--bg);
  }

  /* HEADER */
  header{
    padding: calc(18px + var(--safe-top)) 20px 14px;
    position:sticky; top:0; z-index:20;
    background: rgba(10,13,18,0.92);
    backdrop-filter: blur(14px);
    border-bottom:1px solid var(--card-border);
  }
  .header-top{
    display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;
  }
  .eyebrow{
    font-size:12px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--amber); font-weight:700; display:flex; align-items:center; gap:6px;
  }
  .eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--amber); box-shadow:0 0 0 0 rgba(245,185,66,.6); animation:pulse 2s infinite;}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(245,185,66,.55);}
    70%{box-shadow:0 0 0 8px rgba(245,185,66,0);}
    100%{box-shadow:0 0 0 0 rgba(245,185,66,0);}
  }
  .refresh-btn{
    width:50px; height:50px; border-radius:50%;
    background:var(--bg-elevated); border:1px solid var(--card-border);
    color:var(--amber); cursor:pointer; display:flex; align-items:center; justify-content:center;
    font-size:32px; transition: all .2s ease;
  }
  .refresh-btn:hover{
    border-color:var(--amber); background:rgba(245,185,66,0.1);
  }
  .refresh-btn.spinning{
    animation: spin .8s linear infinite;
  }
  @keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
  }
  h1{
    font-family: "Helvetica", "Helvetica Neue", Arial, sans-serif;
    font-size:32px; line-height:1.05; margin:6px 0 2px;
    font-weight:600; letter-spacing:-.01em;
    text-transform:capitalize;
  }
  .datesub{color:var(--text-dim); font-size:15px; margin-bottom:12px;}
  .stat-row{display:flex; gap:6px;}
  .stat{
    flex:1; background:var(--bg-elevated); border:1px solid var(--card-border);
    border-radius:10px; padding:10px 8px;
  }
  .stat b{display:block; font-size:22px; font-variant-numeric: tabular-nums; color:var(--text);}
  .stat span{font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.05em;}
  .stat.warn b{color:var(--red);}

  /* TABS */
  .tabs{
    display:flex; gap:6px; padding:12px 20px 0;
    position:sticky; top: 0; z-index:19;
  }
  .tabbar-wrap{
    background: rgba(10,13,18,0.92); backdrop-filter: blur(14px);
    border-bottom:1px solid var(--card-border);
    position:sticky; top:0; z-index:19; padding-bottom:10px;
  }
  .tab{
    flex:1; text-align:center; padding:11px 8px; border-radius:12px;
    font-size:15px; font-weight:600; color:var(--text-dim);
    background:var(--bg-elevated); border:1px solid var(--card-border);
    cursor:pointer; user-select:none; transition: all .15s ease;
    position:relative;
  }
  .tab.active{ color:#12161e; background:var(--amber); border-color:var(--amber);}
  .tab .count{ font-size:11px; opacity:.8; margin-left:3px;}

  .search-wrap{padding:12px 20px 0;}
  .search{
    width:100%; padding:12px 14px; border-radius:10px; border:1px solid var(--card-border);
    background:var(--bg-elevated); color:var(--text); font-size:16px; outline:none;
  }
  .search::placeholder{color:var(--text-faint);}

  /* LIST */
  main{flex:1; padding: 6px 12px calc(30px + var(--safe-bottom));}
  .group-label{
    font-size:13px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-faint);
    padding:16px 6px 8px; font-weight:700;
  }
  .group-label.status{color:var(--amber);}
  .group-label.overdue{color:var(--red);}
  .group-label.today{color:var(--amber);}

  .card{
    display:flex; align-items:center; gap:14px;
    background:var(--card); border:1px solid var(--card-border);
    border-radius:14px; padding:12px; margin-bottom:8px;
    text-decoration:none; color:inherit; cursor:pointer;
    transition: transform .08s ease, border-color .12s ease;
  }
  .card:active{ transform: scale(0.985); border-color: var(--amber-dim); background:#1b2129;}

  .status-chip{
    min-width:65px; text-align:center; flex-shrink:0;
  }
  .status-chip b{display:block; font-size:18px; font-weight:700; color:var(--amber);}
  .status-chip span{display:block; font-size:13px; color:var(--text-faint); text-transform:uppercase;}

  .card-body{flex:1; min-width:0;}
  .card-company{font-size:16px; font-weight:700; color:#00bfff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .card-name{font-size:15px; color:#ffffff; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:500;}
  .card-note{font-size:12px; color:var(--text-faint); margin-top:4px; display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; overflow:hidden;}

  .call-btn{
    flex-shrink:0; width:44px; height:44px; border-radius:50%;
    background: var(--amber); display:flex; align-items:center; justify-content:center;
    color:#0a0d12; cursor:pointer; transition:all .15s ease;
    padding:0; border:none;
  }
  .call-btn svg{
    width:24px; height:24px;
    stroke:#0a0d12;
  }
  .call-btn:active{
    transform:scale(0.92);
  }

  .empty{
    text-align:center; padding:60px 20px; color:var(--text-dim);
  }
  .empty .spark{font-size:48px; margin-bottom:16px;}
  .empty b{display:block; color:var(--text); font-size:18px; margin-bottom:8px;}
  .empty p{font-size:15px; margin:0;}

  .loading{
    text-align:center; padding:50px 20px; color:var(--text-dim);
  }
  .loading .spinner{
    width:40px; height:40px; border:3px solid var(--card-border); border-top-color:var(--amber);
    border-radius:50%; margin:0 auto 15px; animation:spin .8s linear infinite;
  }

  /* DETAIL VIEW */
  .detail-overlay{
    position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7);
    z-index:100; opacity:0; pointer-events:none; transition:opacity .2s ease;
  }
  .detail-overlay.active{
    opacity:1; pointer-events:auto;
  }
  .detail-panel{
    position:fixed; bottom:0; left:0; right:0; max-width:480px;
    margin:0 auto; background:var(--bg); border-radius:24px 24px 0 0;
    border-top:1px solid var(--card-border); z-index:101;
    max-height:90vh; display:flex; flex-direction:column;
    transform:translateY(100%); transition:transform .3s ease;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
  }
  .detail-panel.active{
    transform:translateY(0);
  }
  .detail-header{
    padding: 20px 20px 16px; border-bottom:1px solid var(--card-border);
    display:flex; justify-content:space-between; align-items:center;
  }
  .detail-header h2{
    margin:0; font-size:18px; font-weight:600; color:var(--text);
    flex:1;
  }
  .detail-buttons{
    display:flex; gap:10px;
  }
  .detail-back, .detail-close{
    width:32px; height:32px; border-radius:50%; background:var(--bg-elevated);
    border:1px solid var(--card-border); color:var(--text); cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:20px;
    transition: all .15s ease;
  }
  .detail-back:active, .detail-close:active{
    background:var(--card);
  }
  .detail-content{
    flex:1; overflow-y:auto; padding:20px;
  }
  .detail-row{
    margin-bottom:20px;
  }
  .detail-label{
    font-size:13px; text-transform:uppercase; letter-spacing:.08em;
    color:var(--text-faint); margin-bottom:8px; font-weight:700;
  }
  .detail-value{
    font-size:18px; color:var(--text); line-height:1.6;
    padding:14px; background:var(--card); border-radius:10px;
    border:1px solid var(--card-border); word-break:break-word;
    white-space: pre-wrap;
    white-space: -moz-pre-wrap;
    word-wrap: break-word;
  }
  .detail-value.action{
    background:var(--card); border-color:var(--card-border);
    color:#ffffff; font-weight:600;
  }
  .detail-value a{
    color:var(--teal); text-decoration:none;
  }
  .detail-value a:active{
    opacity:0.8;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-top">
      <h1>EnergyPartners</h1>
      <button class="refresh-btn" id="refreshBtn" title="Obnoviť">⟳</button>
    </div>
    <div class="datesub" id="dateDisplay"></div>
  </header>

  <div style="padding: 16px 20px 0;">
    <div class="stat-row">
      <div class="stat">
        <b id="statToday">0</b>
        <span>Dnes</span>
      </div>
      <div class="stat">
        <b id="statOverdue">0</b>
        <span>Zmeškané</span>
      </div>
    </div>
  </div>

  <div class="tabbar-wrap">
    <div class="tabs">
      <div class="tab active" data-tab="today">Dnes</div>
      <div class="tab" data-tab="all">Všetky</div>
    </div>
  </div>

  <div class="search-wrap">
    <div style="position:relative; display:flex; align-items:center;">
      <input type="text" class="search" id="searchInput" placeholder="Hľadaj spoločnosť alebo osobu...">
      <button id="searchClear" style="position:absolute; right:12px; background:none; border:none; color:var(--text-dim); font-size:20px; cursor:pointer; padding:4px 8px; display:none; transition:all .15s ease;">✕</button>
    </div>
  </div>

  <main>
    <div id="list" class="loading">
      <div class="spinner"></div>
      <b>Načítavam dáta...</b>
      <p>Pripájam sa na Google Sheets</p>
    </div>
  </main>
</div>

<!-- Detail Panel -->
<div class="detail-overlay" id="detailOverlay"></div>
<div class="detail-panel" id="detailPanel">
  <div class="detail-header">
    <h2 id="detailTitle">Detail</h2>
    <div class="detail-buttons">
      <button class="detail-back" id="detailBack" title="Späť">←</button>
      <button class="detail-close" id="detailClose" title="Zatvoriť">✕</button>
    </div>
  </div>
  <div class="detail-content" id="detailContent"></div>
</div>

<script>
const SHEET_ID = '1yjOl0-yYSOI2lTCxflBfZWiohGkQmJkMVJLIlxGBUdU';
const SHEET_GID = '356854980';
const API_KEY = 'AIzaSyDRccaAkI4j_NCHTxw3LbJpl2j1IBpSAN8';

let DATA = [];
let searchTerm = '';
let currentTab = 'today';

async function loadData(){
  try {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/A:I?key=${API_KEY}`;
    const response = await fetch(url);
    
    if(!response.ok) throw new Error('API Error: ' + response.statusText);
    
    const result = await response.json();
    const rows = result.values || [];
    
    DATA = [];
    
    // Skip header row (index 0), process data rows
    for(let i = 1; i < rows.length; i++){
      const row = rows[i];
      if(!row || row.length === 0) continue;
      
      // Map columns: A=0, B=1, C=2, D=3, E=4, F=5, G=6, H=7, I=8
      const item = {
        company: row[0] || '',      // A - Názov firmy
        name: row[1] || '',         // B - Meno
        tel: cleanPhone(row[2] || ''),     // C - Telefón
        tel2: cleanPhone(row[3] || ''),    // D - Telefón 2
        status: row[4] || '',       // E - Stav
        note: row[5] || '',         // F - Poznámka (nie som si istý, ale preskočim)
        date: row[6] || '',         // G - Dátum
        time: row[7] || '',         // H - Čas
        next: row[8] || ''          // I - Ďalší krok
      };
      
      // Parse date and calculate bucket
      item._date = parseDate(item.date);
      item._bucket = calculateBucket(item._date);
      
      if(item.company){
        DATA.push(item);
      }
    }
    
    console.log('Loaded', DATA.length, 'records from Google Sheets');
    render();
    
  } catch(error){
    console.error('Error loading data:', error);
    document.getElementById('list').innerHTML = emptyState(
      'Chyba pri načítaní',
      'Nie je možné sa pripojiť k Google Sheets. Skontroluj API kľúč a ID tabuľky.\n\nChyba: ' + error.message
    );
  }
}

function timeToMinutes(timeStr){
  if(!timeStr) return 0;
  const parts = timeStr.split(':');
  const hours = parseInt(parts[0]) || 0;
  const minutes = parseInt(parts[1]) || 0;
  return hours * 60 + minutes;
}

function cleanPhone(phone){
  if(!phone) return '';
  // Remove spaces and special chars, keep only numbers and +
  return phone.replace(/[^\d+]/g, '');
}

function parseDate(dateStr){
  if(!dateStr) return null;
  // Try various date formats: DD.MM.YYYY, DD/MM/YYYY, DD-MM-YYYY
  const formats = [
    /^(\d{1,2})\.(\d{1,2})\.(\d{4})$/,  // DD.MM.YYYY
    /^(\d{1,2})\/(\d{1,2})\/(\d{4})$/,  // DD/MM/YYYY
    /^(\d{1,2})-(\d{1,2})-(\d{4})$/     // DD-MM-YYYY
  ];
  
  for(let fmt of formats){
    const match = dateStr.trim().match(fmt);
    if(match){
      const d = parseInt(match[1]);
      const m = parseInt(match[2]) - 1;
      const y = parseInt(match[3]);
      return new Date(y, m, d, 0, 0, 0);
    }
  }
  
  return null;
}

function calculateBucket(date){
  if(!date) return 'later';
  
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const tomorrow = new Date(today);
  tomorrow.setDate(tomorrow.getDate() + 1);
  const weekEnd = new Date(today);
  weekEnd.setDate(weekEnd.getDate() + 7);
  
  if(date < today) return 'overdue';
  if(date < tomorrow) return 'today';
  if(date < weekEnd) return 'week';
  return 'later';
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function emptyState(msg, sub){
  return `<div class="empty"><div class="spark">⚡</div><b>${msg}</b><p>${sub}</p></div>`;
}

function renderCard(item, idx){
  const callPhone = item.tel || item.tel2 || '';
  const dateStr = item._date ? item._date.getDate() + '.' + (item._date.getMonth()+1) : '';
  
  // Skontrolovať či je čas v minulosti
  let timeColor = 'var(--amber)';
  if(item._date && item.time){
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const itemDate = new Date(item._date.getFullYear(), item._date.getMonth(), item._date.getDate());
    
    if(itemDate.getTime() === today.getTime()){
      // Dnes - porovnaj čas v minútach
      const currentTimeMinutes = now.getHours() * 60 + now.getMinutes();
      const itemTimeMinutes = timeToMinutes(item.time || '');
      if(itemTimeMinutes < currentTimeMinutes){
        timeColor = 'var(--red)'; // Červená ak je minulý čas
      }
    } else if(itemDate < today){
      timeColor = 'var(--red)'; // Červená ak je minulý dátum
    }
  }
  
  return `
    <div class="card" data-item="${JSON.stringify(item).replace(/"/g, '&quot;')}">
      <div class="status-chip">
        <b style="color:${timeColor};">${escapeHtml(item.time || '-')}</b>
        <span>${dateStr}</span>
        ${item.status ? `<div style="margin-top:6px; font-size:11px; color:#0a0d12; background:var(--teal); border:1px solid var(--teal); padding:3px 8px; border-radius:5px; font-weight:600; white-space:nowrap;">${escapeHtml(item.status)}</div>` : ''}
      </div>
      <div class="card-body">
        <div class="card-company">${escapeHtml(item.company)}</div>
        ${item.name ? `<div class="card-name">${escapeHtml(item.name)}</div>` : ''}
        <div style="margin-top:12px; display:flex; flex-wrap:wrap; gap:8px; align-items:center; justify-content:center; min-height:20px;">
          ${item.next ? `<span style="font-size:12px; color:var(--text-dim);">${escapeHtml(item.next)}</span>` : ''}
        </div>
      </div>
      ${callPhone ? `<a class="call-btn" href="tel:${callPhone}" title="Zavolať"><svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg></a>` : ''}
    </div>
  `;
}

function render(){
  const list = document.getElementById('list');
  let items = DATA.slice();
  let html = '';
  
  // Update statistics
  updateStats();
  
  // Apply search filter
  if(searchTerm){
    const t = searchTerm.toLowerCase();
    items = items.filter(d => 
      (d.company||'').toLowerCase().includes(t) || 
      (d.name||'').toLowerCase().includes(t)
    );
  }
  
  // Apply tab filter
  if(currentTab === 'today'){
    const todayItems = items.filter(d => d._bucket === 'today').sort((a,b) => timeToMinutes(a.time||'') - timeToMinutes(b.time||''));
    if(todayItems.length === 0){
      html = emptyState('Dnes nie sú naplánované žiadne hovory', 'Pozri si Všetky.');
    } else {
      html = todayItems.map((item, idx) => renderCard(item, idx)).join('');
    }
  } else if(currentTab === 'all'){
    // Triedenie podľa dátumu a času
    const sorted = items.sort((a,b) => {
      const dateA = a._date?.getTime() || Infinity;
      const dateB = b._date?.getTime() || Infinity;
      if(dateA !== dateB) return dateA - dateB;
      return timeToMinutes(a.time||'') - timeToMinutes(b.time||'');
    });
    if(sorted.length === 0){
      html = emptyState('Nič sa nenašlo', 'Skús iné hľadané slovo.');
    } else {
      html = sorted.map((item, idx) => renderCard(item, idx)).join('');
    }
  }
  
  list.innerHTML = html;
  
  document.querySelectorAll('.card').forEach((card) => {
    card.addEventListener('click', () => {
      const itemJson = card.getAttribute('data-item');
      if(itemJson){
        const item = JSON.parse(itemJson);
        showDetail(item);
      }
    });
  });
}

function updateStats(){
  const today = DATA.filter(d => d._bucket === 'today').length;
  
  // Počítať červené časy - časy v minulosti
  let redCount = 0;
  const now = new Date();
  const todayDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const currentTimeMinutes = now.getHours() * 60 + now.getMinutes();
  
  DATA.forEach(item => {
    if(item._date && item.time){
      const itemDate = new Date(item._date.getFullYear(), item._date.getMonth(), item._date.getDate());
      if(itemDate.getTime() === todayDate.getTime()){
        const itemTimeMinutes = timeToMinutes(item.time);
        if(itemTimeMinutes < currentTimeMinutes) redCount++;
      } else if(itemDate < todayDate){
        redCount++;
      }
    }
  });
  
  document.getElementById('statToday').textContent = today;
  document.getElementById('statOverdue').textContent = redCount;
}

function showDetail(item){
  const title = item.company || item.name || 'Detail';
  const detailTitle = document.getElementById('detailTitle');
  const detailContent = document.getElementById('detailContent');
  
  detailTitle.textContent = escapeHtml(title);
  
  let contentHtml = '';
  
  if(item.company){
    contentHtml += `
      <div class="detail-row">
        <div class="detail-label">Spoločnosť</div>
        <div class="detail-value">${escapeHtml(item.company)}</div>
      </div>
    `;
  }
  
  if(item.name){
    contentHtml += `
      <div class="detail-row">
        <div class="detail-label">Kontaktná osoba</div>
        <div class="detail-value">${escapeHtml(item.name)}</div>
      </div>
    `;
  }
  
  if(item.tel){
    contentHtml += `
      <div class="detail-row">
        <div class="detail-label">Telefón</div>
        <div class="detail-value"><a href="tel:${item.tel}">${escapeHtml(item.tel)}</a></div>
      </div>
    `;
  }
  
  if(item.tel2){
    contentHtml += `
      <div class="detail-row">
        <div class="detail-label">Telefón 2</div>
        <div class="detail-value"><a href="tel:${item.tel2}">${escapeHtml(item.tel2)}</a></div>
      </div>
    `;
  }
  
  if(item.status){
    contentHtml += `
      <div class="detail-row">
        <div class="detail-label">Stav</div>
        <div class="detail-value">${escapeHtml(item.status)}</div>
      </div>
    `;
  }
  
  if(item.date){
    contentHtml += `
      <div class="detail-row">
        <div class="detail-label">Dátum</div>
        <div class="detail-value">${escapeHtml(item.date)}</div>
      </div>
    `;
  }
  
  if(item.time){
    contentHtml += `
      <div class="detail-row">
        <div class="detail-label">Čas</div>
        <div class="detail-value">${escapeHtml(item.time)}</div>
      </div>
    `;
  }
  
  if(item.note){
    contentHtml += `
      <div class="detail-row">
        <div class="detail-label">Poznámka</div>
        <div class="detail-value">${escapeHtml(item.note)}</div>
      </div>
    `;
  }
  
  if(item.next){
    contentHtml += `
      <div class="detail-row">
        <div class="detail-label">Ďalší krok</div>
        <div class="detail-value action">${escapeHtml(item.next)}</div>
      </div>
    `;
  }
  
  detailContent.innerHTML = contentHtml;
  
  document.getElementById('detailOverlay').classList.add('active');
  document.getElementById('detailPanel').classList.add('active');
}

function closeDetail(){
  document.getElementById('detailOverlay').classList.remove('active');
  document.getElementById('detailPanel').classList.remove('active');
}

// Event listeners
document.getElementById('detailClose').addEventListener('click', closeDetail);
document.getElementById('detailBack').addEventListener('click', closeDetail);

document.getElementById('detailOverlay').addEventListener('click', (e) => {
  if(e.target === document.getElementById('detailOverlay')){
    closeDetail();
  }
});

document.getElementById('searchInput').addEventListener('input', (e) => {
  searchTerm = e.target.value;
  const clearBtn = document.getElementById('searchClear');
  clearBtn.style.display = searchTerm ? 'block' : 'none';
  render();
});

document.getElementById('searchClear').addEventListener('click', () => {
  document.getElementById('searchInput').value = '';
  searchTerm = '';
  document.getElementById('searchClear').style.display = 'none';
  render();
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    searchTerm = '';
    document.getElementById('searchInput').value = '';
    document.getElementById('searchWrap').style.display = currentTab === 'all' ? 'block' : 'none';
    
    // Po kliknutí na tabuľku - refresh dáta
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');
    loadData();
    setTimeout(() => {
      btn.classList.remove('spinning');
      render();
    }, 500);
  });
});

document.getElementById('refreshBtn').addEventListener('click', () => {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  loadData();
  setTimeout(() => {
    btn.classList.remove('spinning');
  }, 1000);
});

// Update date display
function updateDate(){
  const now = new Date();
  const days = ['Nedeľa','Pondelok','Utorok','Streda','Štvrtok','Piatok','Sobota'];
  const months = ['Jan','Feb','Mar','Apr','Máj','Jún','Jul','Aug','Sep','Okt','Nov','Dec'];
  const dateStr = `${days[now.getDay()]} ${now.getDate()}. ${months[now.getMonth()]} ${now.getFullYear()}`;
  document.getElementById('dateDisplay').textContent = dateStr;
}

// Initialize
updateDate();
loadData();

// Refresh data every 5 minutes
setInterval(loadData, 5 * 60 * 1000);

// Register Service Worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(err => {
    console.log('ServiceWorker registration failed (optional): ', err);
  });
}
</script>
